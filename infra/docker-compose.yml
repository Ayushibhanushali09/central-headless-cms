name: central-headless-cms

services:
  mongodb:
    image: mongo:8.0
    container_name: cms-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - cms_mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.runCommand({ ping: 1 }).ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: cms-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - cms_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - cms_minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: cms-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin;
      do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/cms-media;
      mc anonymous set download local/cms-media;
      echo 'MinIO bucket cms-media is ready';
      exit 0;
      "

volumes:
  cms_mongodb_data:
  cms_redis_data:
  cms_minio_data: